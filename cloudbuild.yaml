steps:
  - name: gcr.io/cloud-builders/docker
    args: ['build', '-t', '${_IMAGE}', '.']
  - name: gcr.io/cloud-builders/docker
    args: ['push', '${_IMAGE}']
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args: ['run', 'deploy', 'jaguar-technologies', '--image', '${_IMAGE}', '--region', '${_REGION}', '--platform', 'managed', '--allow-unauthenticated']
substitutions:
  _REGION: us-central1
  _IMAGE: gcr.io/$PROJECT_ID/jaguar-technologies:latest
