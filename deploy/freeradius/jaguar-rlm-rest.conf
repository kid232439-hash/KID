# FreeRADIUS rlm_rest example for JAGUAR TECHNOLOGIES.
# Install FreeRADIUS, enable mods-available/rest, then adapt this file into mods-enabled/rest.
# The backend returns allow/rate_limit/radius_group; map these fields in unlang for your policy.
rest jaguar_backend {
  connect_uri = "http://jaguar-api:8000"
  authorize {
    uri = "${..connect_uri}/api/radius/authorize"
    method = "post"
    body = "json"
    data = '{"username":"%{User-Name}","password":"%{User-Password}","nas_ip_address":"%{NAS-IP-Address}"}'
    header = "X-Radius-Secret: change-radius-secret"
    tls = no
  }
  accounting {
    uri = "${..connect_uri}/api/radius/accounting"
    method = "post"
    body = "json"
  }
}
